<!DOCTYPE html>
<html>
<head>
    <title>Exp data</title>

    <script src="/maintenance.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #1e293b, #020617);
        }

        /* LOCK SCREEN */
        #lockScreen {
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999999;
        }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            width: 300px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .lock-icon {
            font-size: 55px;
            margin-bottom: 20px;
            transition: 0.5s ease;
        }

        .unlock {
            transform: scale(1.3) rotateY(180deg);
        }

        h2 {
            color: #e2e8f0;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 15px;
            text-align: center;
            background: rgba(255,255,255,0.1);
            color: white;
            transition: 0.3s;
        }

        input:focus {
            background: rgba(255,255,255,0.2);
            box-shadow: 0 0 0 2px #22c55e;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        #hint {
            font-size: 12px;
            margin-top: 6px;
            color: #94a3b8;
            display: none;
        }

        #error {
            color: #ef4444;
            font-size: 13px;
            margin-top: 10px;
            min-height: 16px;
        }

        /* IFRAME */
        #content-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .hidden-frame {
            visibility: hidden;
        }
    </style>
</head>

<body>

<div id="lockScreen">
    <div class="card">
        <div id="lockIcon" class="lock-icon">🔒</div>
        <h2>Secure Access</h2>

        <input 
            type="password" 
            id="password" 
            placeholder="Enter Password"
            onfocus="showHint()" 
            onblur="hideHint()"
        >

        <div id="hint">password was same as RMS pc</div>

        <button onclick="checkPassword()">Unlock</button>

        <div id="error"></div>
    </div>
</div>

<iframe
    id="content-frame"
    class="hidden-frame"
    allow="clipboard-read; clipboard-write"
    src="https://script.google.com/macros/s/AKfycbyho1R-_f_swNgt1zL34YgqgOWufJnIIKgFePJX-lX9yEMjdHojjk4XnfCvir8ohd-L/exec">
</iframe>

<script>
const validPasswords = ["JD@12348765", "MArj@2191", "harsh@2001"];

const input = document.getElementById("password");

// ✅ Auto focus (no click needed)
window.onload = () => {
    input.focus();
};

// ✅ Enter key trigger
input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        checkPassword();
    }
});

function checkPassword() {
    const value = input.value;
    const error = document.getElementById("error");
    const lockIcon = document.getElementById("lockIcon");

    if (validPasswords.includes(value)) {
        error.innerText = "";

        lockIcon.innerText = "🔓";
        lockIcon.classList.add("unlock");

        setTimeout(() => {
            document.getElementById("lockScreen").style.opacity = "0";
            setTimeout(() => {
                document.getElementById("lockScreen").style.display = "none";
                document.getElementById("content-frame").classList.remove("hidden-frame");
            }, 300);
        }, 600);

    } else {
        error.innerText = "Incorrect password";
        input.style.animation = "shake 0.3s";
        setTimeout(() => input.style.animation = "", 300);
    }
}

// Shake animation
const style = document.createElement('style');
style.innerHTML = `
@keyframes shake {
  0% {transform: translateX(0);}
  25% {transform: translateX(-5px);}
  50% {transform: translateX(5px);}
  75% {transform: translateX(-5px);}
  100% {transform: translateX(0);}
}`;
document.head.appendChild(style);

function showHint() {
    document.getElementById("hint").style.display = "block";
}

function hideHint() {
    document.getElementById("hint").style.display = "none";
}
</script>

</body>
</html>
