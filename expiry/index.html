<!DOCTYPE html>
<html>
<head>
    <title>Exp data</title>

    <script src="/maintenance.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <style>
        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #020617, #0f172a, #020617);
            overflow: hidden;
        }

        /* CENTER */
        #lockScreen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999999;
        }

        /* CARD */
        .card {
            width: 340px;
            padding: 40px 30px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 80px rgba(0,0,0,0.6);
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .lock-icon {
            font-size: 50px;
            margin-bottom: 15px;
            transition: 0.5s;
        }

        .unlock {
            transform: scale(1.3) rotateY(180deg);
        }

        h2 {
            color: #e2e8f0;
            font-weight: 500;
            margin-bottom: 25px;
        }

        /* FLOATING INPUT */
        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            outline: none;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 14px;
        }

        label {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 13px;
            pointer-events: none;
            transition: 0.3s;
        }

        input:focus + label,
        input:not(:placeholder-shown) + label {
            top: -8px;
            font-size: 11px;
            color: #22c55e;
        }

        /* SHOW PASSWORD */
        .toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 14px;
            color: #94a3b8;
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 13px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 20px rgba(34,197,94,0.4);
        }

        #hint {
            font-size: 12px;
            color: #64748b;
            margin-top: 6px;
            display: none;
        }

        #error {
            color: #ef4444;
            font-size: 13px;
            margin-top: 10px;
            min-height: 18px;
        }

        /* IFRAME */
        #content-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .hidden-frame {
            visibility: hidden;
        }

        /* SHAKE */
        @keyframes shake {
            0% {transform: translateX(0);}
            25% {transform: translateX(-5px);}
            50% {transform: translateX(5px);}
            75% {transform: translateX(-5px);}
            100% {transform: translateX(0);}
        }
    </style>
</head>

<body>

<div id="lockScreen">
    <div class="card">
        <div id="lockIcon" class="lock-icon">🔒</div>
        <h2>Secure Access</h2>

        <div class="input-group">
            <input type="password" id="password" required placeholder=" " 
                   onfocus="showHint()" onblur="hideHint()">
            <label>Password</label>
            <span class="toggle" onclick="togglePassword()">👁</span>
        </div>

        <div id="hint">password was same as RMS pc</div>

        <button onclick="checkPassword()">Unlock</button>

        <div id="error"></div>
    </div>
</div>

<iframe
    id="content-frame"
    class="hidden-frame"
    allow="clipboard-read; clipboard-write"
    src="https://script.google.com/macros/s/AKfycbyho1R-_f_swNgt1zL34YgqgOWufJnIIKgFePJX-lX9yEMjdHojjk4XnfCvir8ohd-L/exec">
</iframe>

<script>
const validPasswords = ["JD@12348765", "MArj@2191", "harsh@2001"];
const input = document.getElementById("password");

/* Autofocus */
window.addEventListener("DOMContentLoaded", () => {
    setTimeout(() => input.focus(), 100);
});

/* Enter key */
input.addEventListener("keydown", e => {
    if (e.key === "Enter") checkPassword();
});

/* Toggle password */
function togglePassword() {
    input.type = input.type === "password" ? "text" : "password";
}

/* Check password */
function checkPassword() {
    const val = input.value;
    const error = document.getElementById("error");
    const lock = document.getElementById("lockIcon");

    if (validPasswords.includes(val)) {
        error.innerText = "";
        lock.innerText = "🔓";
        lock.classList.add("unlock");

        setTimeout(() => {
            document.getElementById("lockScreen").style.opacity = "0";
            document.getElementById("lockScreen").style.transform = "scale(1.1)";
            
            setTimeout(() => {
                document.getElementById("lockScreen").style.display = "none";
                document.getElementById("content-frame").classList.remove("hidden-frame");
            }, 300);
        }, 500);

    } else {
        error.innerText = "Incorrect password";
        input.style.animation = "shake 0.3s";
        setTimeout(() => input.style.animation = "", 300);
    }
}

function showHint() {
    document.getElementById("hint").style.display = "block";
}

function hideHint() {
    document.getElementById("hint").style.display = "none";
}
</script>

</body>
</html>
