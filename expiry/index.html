<!DOCTYPE html>
<html>
<head>
    <title>Exp data</title>

    <!-- KEEP THIS FIRST -->
    <script src="/maintenance.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* LOCK SCREEN */
        #lockScreen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999999;
        }

        .lock-icon {
            font-size: 60px;
            margin-bottom: 20px;
            transition: 0.5s;
        }

        .unlock {
            transform: scale(1.2) rotateY(180deg);
        }

        input {
            padding: 10px;
            font-size: 16px;
            border-radius: 6px;
            border: none;
            outline: none;
            margin-bottom: 10px;
            width: 220px;
            text-align: center;
        }

        button {
            padding: 10px 16px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        #hint {
            font-size: 12px;
            margin-top: 5px;
            color: #94a3b8;
            display: none;
        }

        #error {
            color: red;
            font-size: 13px;
            margin-top: 8px;
        }

        /* IFRAME */
        #content-frame {
            display: block;   /* IMPORTANT: keep it loaded */
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Hide iframe visually until unlock */
        .hidden-frame {
            visibility: hidden;
        }
    </style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
    <div id="lockIcon" class="lock-icon">🔒</div>

    <input type="password" id="password" placeholder="Enter Password"
        onfocus="showHint()" onblur="hideHint()">

    <div id="hint">password was same as RMS pc</div>

    <button onclick="checkPassword()">Unlock</button>

    <div id="error"></div>
</div>

<!-- IFRAME (ALREADY LOADED BUT HIDDEN) -->
<iframe
    id="content-frame"
    class="hidden-frame"
    allow="clipboard-read; clipboard-write"
    src="https://script.google.com/macros/s/AKfycbyho1R-_f_swNgt1zL34YgqgOWufJnIIKgFePJX-lX9yEMjdHojjk4XnfCvir8ohd-L/exec">
</iframe>

<script>
const validPasswords = ["JD@12348765", "MArj@2191", "harsh@2001"];

function checkPassword() {
    const input = document.getElementById("password").value;
    const error = document.getElementById("error");
    const lockIcon = document.getElementById("lockIcon");

    if (validPasswords.includes(input)) {
        error.innerText = "";

        lockIcon.innerText = "🔓";
        lockIcon.classList.add("unlock");

        setTimeout(() => {
            document.getElementById("lockScreen").style.display = "none";
            document.getElementById("content-frame").classList.remove("hidden-frame");
        }, 700);

    } else {
        error.innerText = "Wrong Password!";
    }
}

function showHint() {
    document.getElementById("hint").style.display = "block";
}

function hideHint() {
    document.getElementById("hint").style.display = "none";
}
</script>

</body>
</html>
