<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Access</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Container */
.lock-container {
    text-align: center;
}

/* Lock Icon */
.lock {
    font-size: 80px;
    transition: 0.5s;
}

/* Input */
input {
    padding: 10px;
    border-radius: 8px;
    border: none;
    margin-top: 20px;
    font-size: 16px;
}

/* Button */
button {
    padding: 10px 20px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #22c55e;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* Error Animation */
.error {
    animation: shake 0.3s;
    color: red;
}

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}

/* Unlock Animation */
.unlock {
    transform: rotate(-20deg) scale(1.2);
    color: #22c55e;
}

/* Hide lock screen */
.hidden {
    display: none;
}

/* Iframe full screen */
iframe {
    width: 100%;
    height: 100vh;
    border: none;
}
</style>
</head>

<body>

<div class="lock-container" id="lockScreen">
    <div id="lockIcon" class="lock">🔒</div>
    <h2>Enter Password</h2>
    <input type="password" id="password" placeholder="Password">
    <br>
    <button onclick="checkPassword()">Unlock</button>
    <p id="message"></p>
</div>

<iframe id="mainFrame" class="hidden"></iframe>

<script>
function checkPassword() {
    const input = document.getElementById("password").value;
    const lock = document.getElementById("lockIcon");
    const msg = document.getElementById("message");

    if (input === "JD@12348765") {
        // Correct animation
        lock.classList.add("unlock");
        msg.style.color = "lightgreen";
        msg.innerText = "Access Granted 🔓";

        setTimeout(() => {
            document.getElementById("lockScreen").classList.add("hidden");
            const frame = document.getElementById("mainFrame");
            frame.src = "https://script.google.com/macros/s/AKfycbyho1R-_f_swNgt1zL34YgqgOWufJnIIKgFePJX-lX9yEMjdHojjk4XnfCvir8ohd-L/exec";
            frame.classList.remove("hidden");
        }, 1200);

    } else {
        // Wrong animation
        msg.innerText = "Wrong Password ❌";
        msg.classList.add("error");

        setTimeout(() => {
            msg.classList.remove("error");
        }, 300);
    }
}
</script>

</body>
</html>
