<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Access</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* Container */
.lock-container {
    text-align: center;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

/* Lock Icon */
.lock {
    font-size: 80px;
    transition: 0.5s;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #22c55e; }
    to { text-shadow: 0 0 25px #22c55e; }
}

/* Input */
input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 20px;
    font-size: 16px;
    width: 220px;
    outline: none;
}

/* Button */
button {
    padding: 12px 25px;
    margin-top: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(45deg, #22c55e, #16a34a);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}
button:hover {
    transform: scale(1.05);
}

/* Error Animation */
.error {
    animation: shake 0.4s;
    color: red;
    text-shadow: 0 0 10px red;
}

@keyframes shake {
    25% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(-4px); }
}

/* Unlock Animation */
.unlock {
    animation: unlockAnim 1s forwards;
}

@keyframes unlockAnim {
    0% { transform: scale(1) rotate(0); }
    50% { transform: scale(1.3) rotate(-20deg); }
    100% { transform: scale(1.2) rotate(-15deg); color: #22c55e; }
}

/* Fade out */
.fadeOut {
    animation: fade 1s forwards;
}

@keyframes fade {
    to { opacity: 0; transform: scale(1.2); }
}
</style>
</head>

<body>

<div class="lock-container" id="lockScreen">
    <div id="lockIcon" class="lock">🔒</div>
    <h2>Enter Password</h2>

    <input type="password" id="password" placeholder="Password">
    <br>
    <button onclick="checkPassword()">Unlock</button>

    <p id="message"></p>
</div>

<script>
const redirectURL = "https://script.google.com/macros/s/AKfycbzvHYXILPi2nBQWdrOW1T1uWIKxu2-5Cmi0LDBY2tp-Uw7mTbFq5EB_IeOM2jFWMhH9/exec";
const correctPassword = "JD@12348765";

function checkPassword() {
    const input = document.getElementById("password").value;
    const lock = document.getElementById("lockIcon");
    const msg = document.getElementById("message");

    if (input === correctPassword) {

        msg.style.color = "#22c55e";
        msg.innerText = "Access Granted 🔓";

        lock.classList.add("unlock");

        setTimeout(() => {
            document.getElementById("lockScreen").classList.add("fadeOut");
        }, 700);

        setTimeout(() => {
            window.location.href = redirectURL;
        }, 1300);

    } else {

        msg.innerText = "Wrong Password ❌";
        msg.classList.add("error");

        setTimeout(() => {
            msg.classList.remove("error");
        }, 400);
    }
}

/* ENTER key support */
document.getElementById("password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        checkPassword();
    }
});
</script>

</body>
</html>
