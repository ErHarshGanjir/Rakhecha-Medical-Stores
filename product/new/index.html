<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakhecha Medical Stores | Product Album</title>
    <style>
        /* Modern Reset & Full Screen Layout */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; /* Sleek dark background for album feel */
            color: #ffffff;
            overflow: hidden;
        }

        /* Top Header Area */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0));
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        header img {
            height: 50px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        /* Full Screen Album Container */
        .album-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Individual Slides */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.8s ease-in-out, visibility 0.8s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
        }

        /* Full Screen Background Blur Effect */
        .bg-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(20px) brightness(0.4);
            z-index: 1;
            transform: scale(1.1); /* Prevents white edges from blur */
        }

        /* Foreground Main Product Image */
        .product-img {
            position: relative;
            z-index: 2;
            max-width: 85%;
            max-height: 70%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* Product Details Overlay */
        .product-details {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 35px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 80%;
        }

        .product-details h2 {
            font-size: 1.8rem;
            margin: 0;
            text-transform: capitalize;
            letter-spacing: 1px;
        }

        /* Navigation Arrows */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 2rem;
            padding: 15px 25px;
            cursor: pointer;
            border-radius: 50%;
            transition: background 0.3s, transform 0.2s;
            backdrop-filter: blur(5px);
            user-select: none;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-50%) scale(1.05);
        }

        .prev { left: 30px; }
        .next { right: 30px; }
    </style>
</head>
<body>

    <header>
        <img src="https://i.ibb.co/HfxTSLb6/RMS-icon-1.png" alt="Rakhecha Medical Stores Logo">
        <h1>Rakhecha Medical Stores</h1>
    </header>

    <div class="album-container" id="albumContainer">
        </div>

    <button class="nav-btn prev" onclick="changeSlide(-1)">&#10094;</button>
    <button class="nav-btn next" onclick="changeSlide(1)">&#10095;</button>

    <script>
        // ==========================================
        // ADD OR EDIT YOUR PRODUCTS HERE EASY 
        // ==========================================
        const products = [
            {
                image: "https://i.ibb.co/kgsc59X0/depositphotos-195529412-stock-illustration-pharma-company-logo-isolated-on.jpg",
                title: "new added kofol renge"
            },
            {
                image: "https://i.ibb.co/qYXDbTTT/H-book-logo-11zon.png",
                title: "resent luncded"
            },
            {
                image: "https://via.placeholder.com/800x600?text=Product+3+Sample+Image",
                title: "upcoming distribution batch"
            }
            // You can easily add more items here following the same pattern:
            // { image: "URL", title: "YOUR TITLE" }
        ];

        let currentSlideIndex = 0;

        // Function to build the showcase from the data array
        function buildAlbum() {
            const container = document.getElementById('albumContainer');
            container.innerHTML = ''; // Clear existing contents

            products.forEach((product, index) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = `slide ${index === 0 ? 'active' : ''}`;
                
                slideDiv.innerHTML = `
                    <div class="bg-blur" style="background-image: url('${product.image}')"></div>
                    <img class="product-img" src="${product.image}" alt="${product.title}">
                    <div class="product-details">
                        <h2>${product.title}</h2>
                    </div>
                `;
                container.appendChild(slideDiv);
            });
        }

        // Function to handle moving slides forward/backward in a loop
        function changeSlide(direction) {
            const slides = document.querySelectorAll('.slide');
            if (slides.length === 0) return;

            // Remove active class from current slide
            slides[currentSlideIndex].classList.remove('active');

            // Calculate new index with continuous looping logic
            currentSlideIndex = (currentSlideIndex + direction + slides.length) % slides.length;

            // Add active class to new slide
            slides[currentSlideIndex].classList.add('active');
        }

        // Automatically move to the next slide every 5 seconds for a continuous loop display
        let autoSlideInterval = setInterval(() => {
            changeSlide(1);
        }, 5000);

        // Reset the auto-slide timer whenever a user manually clicks an arrow button
        function resetAutoSlideTimer() {
            clearInterval(autoSlideInterval);
            autoSlideInterval = setInterval(() => {
                changeSlide(1);
            }, 5000);
        }

        // Overriding the inline onclick functions to ensure timer resets cleanly
        document.querySelector('.prev').addEventListener('click', () => { changeSlide(-1); resetAutoSlideTimer(); });
        document.querySelector('.next').addEventListener('click', () => { changeSlide(1); resetAutoSlideTimer(); });

        // Initialize the app on page load
        buildAlbum();
    </script>
</body>
</html>
