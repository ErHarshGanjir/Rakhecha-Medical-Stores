<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakhecha Medical Stores | Product Album</title>
    <style>
        /* Modern Reset & Full Screen Layout */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a; 
            color: #ffffff;
            overflow: hidden;
            cursor: default;
        }

        /* Top Header Area - Fades out dynamically */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0));
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            opacity: 1;
            transition: opacity 0.5s ease; /* Smooth fade effect */
        }

        /* Class added by JavaScript to hide the header and mouse cursor */
        .hide-controls {
            opacity: 0;
            pointer-events: none; /* Disables clicking when invisible */
        }
        
        body.hide-controls {
            cursor: none; /* Hides mouse cursor when UI fades out */
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        header img {
            height: 50px;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.5));
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        /* Fullscreen Button */
        .fullscreen-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: background 0.3s, transform 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* Full Screen Album Container */
        .album-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Individual Slides */
        .slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease-in-out, visibility 1s ease-in-out;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
        }

        /* Background Blur Effect */
        .bg-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(25px) brightness(0.35);
            z-index: 1;
            transform: scale(1.15); 
        }

        /* Foreground Product Image with Zoom Animation */
        .product-img {
            position: relative;
            z-index: 2;
            max-width: 85%;
            max-height: 70%;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transform: scale(0.8);
            transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .slide.active .product-img {
            transform: scale(1);
        }

        /* Product Details Overlay with Slide-Up Animation */
        .product-details {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translate(-50%, 50px);
            opacity: 0;
            z-index: 3;
            text-align: center;
            background: rgba(0, 0, 0, 0.65);
            padding: 15px 40px;
            border-radius: 30px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.15);
            max-width: 80%;
            transition: transform 1s ease-out 0.3s, opacity 1s ease-out 0.3s;
        }

        .slide.active .product-details {
            transform: translate(-50%, 0);
            opacity: 1;
        }

        .product-details h2 {
            font-size: 2rem;
            margin: 0;
            text-transform: capitalize;
            letter-spacing: 1.5px;
            color: #ffffff;
            text-shadow: 0 2px 5px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <header id="headerBar">
        <div class="logo-area">
            <img src="https://i.ibb.co/HfxTSLb6/RMS-icon-1.png" alt="Rakhecha Medical Stores Logo">
            <h1>Rakhecha Medical Stores</h1>
        </div>
        <button class="fullscreen-btn" onclick="toggleFullScreen()">
            ⛶ Fullscreen
        </button>
    </header>

    <div class="album-container" id="albumContainer">
        </div>

    <script>
        // ==========================================
        // ADD OR EDIT YOUR PRODUCTS HERE 
        // ==========================================
        const products = [
            {
                image: "https://i.ibb.co/kgsc59X0/depositphotos-195529412-stock-illustration-pharma-company-logo-isolated-on.jpg",
                title: "new added kofol renge"
            },
            {
                image: "https://i.ibb.co/qYXDbTTT/H-book-logo-11zon.png",
                title: "resent luncded"
            },
            {
                image: "https://via.placeholder.com/800x600?text=Product+3+Sample+Image",
                title: "upcoming distribution batch"
            }
        ];

        let currentSlideIndex = 0;

        // Function to build the showcase from the data array
        function buildAlbum() {
            const container = document.getElementById('albumContainer');
            container.innerHTML = ''; 

            products.forEach((product, index) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = `slide ${index === 0 ? 'active' : ''}`;
                
                slideDiv.innerHTML = `
                    <div class="bg-blur" style="background-image: url('${product.image}')"></div>
                    <img class="product-img" src="${product.image}" alt="${product.title}">
                    <div class="product-details">
                        <h2>${product.title}</h2>
                    </div>
                `;
                container.appendChild(slideDiv);
            });
        }

        // Function to handle moving slides
        function changeSlide(direction) {
            const slides = document.querySelectorAll('.slide');
            if (slides.length === 0) return;

            slides[currentSlideIndex].classList.remove('active');
            currentSlideIndex = (currentSlideIndex + direction + slides.length) % slides.length;
            slides[currentSlideIndex].classList.add('active');
        }

        // Auto-slide timer (Changes image every 6 seconds)
        let autoSlideInterval = setInterval(() => { changeSlide(1); }, 6000);

        // ==========================================
        // FULLSCREEN LOGIC
        // ==========================================
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch((err) => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Change button text based on fullscreen state
        document.addEventListener("fullscreenchange", function() {
            const btn = document.querySelector('.fullscreen-btn');
            if (document.fullscreenElement) {
                btn.innerHTML = "✖ Exit Fullscreen";
            } else {
                btn.innerHTML = "⛶ Fullscreen";
            }
        });

        // ==========================================
        // DYNAMIC HIDING LOGIC (Auto-hide Header & Cursor)
        // ==========================================
        let idleTimer;
        const headerBar = document.getElementById('headerBar');

        function showUI() {
            // Remove hiding classes to make header and cursor visible
            headerBar.classList.remove('hide-controls');
            document.body.classList.remove('hide-controls');
            
            // Clear any active timers
            clearTimeout(idleTimer);
            
            // Start a new timer to hide the UI after 2 seconds of inactivity
            idleTimer = setTimeout(() => {
                headerBar.classList.add('hide-controls');
                document.body.classList.add('hide-controls');
            }, 2000); 
        }

        // Listen for mouse movements anywhere on the page
        window.addEventListener('mousemove', showUI);
        window.addEventListener('click', showUI);

        // Initialize the page
        buildAlbum();
        showUI(); // Run once at start
    </script>
</body>
</html>
